# slf4j-simple: logs limpos para a apresentação.
# Silencia o ruído interno do Ratis e mantém os logs da aplicação (RMI, DB, StateMachine).
org.slf4j.simpleLogger.defaultLogLevel=info
# error: esconde o ruído interno do Ratis (heartbeats, retries de gRPC quando falta nó).
# Nossos próprios logs (RMI, DB, StateMachine) contam a história do fluxo.
org.slf4j.simpleLogger.log.org.apache.ratis=error
org.slf4j.simpleLogger.showDateTime=true
org.slf4j.simpleLogger.dateTimeFormat=HH:mm:ss.SSS
org.slf4j.simpleLogger.showShortLogName=true
org.slf4j.simpleLogger.levelInBrackets=true
